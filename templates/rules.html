<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲規則</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background-color: #eeeeee;
        }

        .container {
            width: 85%;
            min-height: 70vh;
            margin: 28px auto;
            padding: 60px;
            background-color: white;
            border-radius: 24px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 42px;
            margin-top: 0;
            margin-bottom: 48px;
        }

        .button {
            display: inline-block;
            margin-right: 8px;
            padding: 14px 34px;
            background-color: #477cff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 24px;
        }

        .button:hover {
            background-color: #245edb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>遊戲規則</h1>

        <a class="button" href="/">返回主選單</a>
        <a class="button" href="/difficulty">開始遊戲</a>
    </div>
</body>
</html>
